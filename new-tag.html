<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Main Dashboard</title>
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/newtag.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="navbar-brand">Tags Dashboard</div>
        <button class="navbar-toggle" aria-label="Toggle navigation">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
        <ul class="navbar-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="search.html">Search</a></li>
          <li><a href="event-control.html">Event Control</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="form-section card">
        <h2>Add New Item</h2>
        <form id="newTagForm" class="form-section">
          <label for="rfid_tag">RFID Tag</label>
          <input type="text" id="rfid_tag" name="rfid_tag" required />

          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />

          <label for="description">Description</label>
          <input type="text" id="description" name="description" required />

          <label for="status">Status</label>
          <select id="status" name="status" required>
            <option value="available">Available</option>
            <option value="unavailable">Unavailable</option>
          </select>

          <label for="certification_code">Certification Code</label>
          <input
            type="text"
            id="certification_code"
            name="certification_code"
            required
          />

          <label for="owner_name">Owner Name</label>
          <input type="text" id="owner_name" name="owner_name" required />

          <label for="retailer_id">Retailer ID</label>
          <input
            type="number"
            id="retailer_id"
            name="retailer_id"
            required
            min="1"
          />

          <button type="submit">Submit</button>
        </form>
        <div id="formMessage"></div>
      </section>
    </main>
    <footer>
      <!-- Footer content goes here -->
    </footer>
    <script type="module" src="./scripts/new-tag.js"></script>
    <script>
      // Responsive navbar toggle
      document.addEventListener("DOMContentLoaded", function () {
        const toggle = document.querySelector(".navbar-toggle");
        const links = document.querySelector(".navbar-links");
        if (toggle && links) {
          toggle.addEventListener("click", function () {
            links.classList.toggle("active");
          });
        }
      });
    </script>
  </body>
</html>
